name: Formula issue
description: Report a Homebrew formula problem.
title: "[Formula]: "
labels: ["bug", "needs-triage"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Include commands and sanitized output.
      placeholder: |
        1. Run brew install ...
        2. See ...
    validations:
      required: true
  - type: input
    id: formula
    attributes:
      label: Formula
      placeholder: bluearch-aws-core
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: macOS version, Homebrew version, CPU architecture.
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I removed credentials, tokens, local paths with sensitive names, and private URLs from this report.
          required: true
