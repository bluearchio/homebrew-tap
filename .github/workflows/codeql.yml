name: CodeQL

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "47 3 * * 2"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze Ruby
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ruby
      - uses: github/codeql-action/analyze@v3
